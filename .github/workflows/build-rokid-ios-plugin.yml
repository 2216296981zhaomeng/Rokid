name: Build Rokid iOS Plugin

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build Rokid iOS framework
        run: |
          chmod +x nativeplugins/Rokid-Glass/tools/ios/build_ios_uni_plugin_framework.sh
          nativeplugins/Rokid-Glass/tools/ios/build_ios_uni_plugin_framework.sh

      - name: Package native plugin
        run: |
          chmod +x nativeplugins/Rokid-Glass/tools/ios/package_ios_native_plugin.sh
          nativeplugins/Rokid-Glass/tools/ios/package_ios_native_plugin.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rokid-Glass-ios-nativeplugin
          path: nativeplugins/Rokid-Glass/dist/Rokid-Glass-ios-nativeplugin.zip
